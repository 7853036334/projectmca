<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Care Center | Staff Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background pattern similar to medical apps */
            background-image: radial-gradient(#1a73e8 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            background-color: #f4f7f6;
        }

        /* Login Card */
        .login-card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        /* Logo Area */
        .login-header i {
            font-size: 60px;
            color: #1a73e8;
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
        }

        /* Button Styling - Matching your 'Predict' button color */
        .login-btn {
            width: 100%;
            padding: 13px;
            background-color: #ff6b6b; /* Matching your image's coral/red button */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #ee5253;
        }

        /* Footer links */
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }

        .footer-links a {
            color: #1a73e8;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Error Message Styling (For Flask Flash) */
        .error-msg {
            background: #ffe0e0;
            color: #d8000c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-md"></i> 
            <h2>Health Center</h2>
            <p>Staff Medical Portal Access</p>
        </div>

       
              <div class="error-msg">Your Health our priority</div>
          

        <form action="/login" method="POST">
            <div class="form-group">
                <label>User ID / Email</label>
                <input type="email" name="username" placeholder="doctor@healthcenter.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Login to System</button>
        </form>

        <div class="footer-links">
            <a href="#">Forgot Password?</a> | <a href="/">Return Home</a>
        </div>
        <div class="footer-links">
    Don't have an account? <a href="{{ url_for('signup_page') }}">Sign Up</a>
</div>
    </div>

</body>
</html>
