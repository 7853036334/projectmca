<!DOCTYPE html>
<html>
<head>
    <title>Admin | User List</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #f4f7f6; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 15px; border: 1px solid #ddd; text-align: left; }
        th { background: #1a73e8; color: white; }
        tr:nth-child(even) { background: #f2f2f2; }
    </style>
</head>
<body>
    <h2>Registered Staff Details</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Email (User ID)</th>
            <th>Password (Plain Text)</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="{{ url_for('index') }}">Back to Home</a>
</body>
</html>
