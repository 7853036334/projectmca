<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Health Center | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: #f4f7f6;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(#1a73e8 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }
        .auth-card {
            background: #fff; width: 400px; padding: 40px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-card i { font-size: 50px; color: #1a73e8; margin-bottom: 10px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .signup-btn {
            width: 100%; padding: 12px; background: #2ecc71; /* Green for signup */
            color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .footer-text { margin-top: 20px; font-size: 13px; }
        .error-msg { color: red; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fas fa-user-plus"></i>
        <h2>Create Account</h2>
        <p style="margin-bottom: 20px; color: #666;">Register as a new Medical Staff</p>

            <div class="error-msg"></div>
      

        <form action="/register" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="username" placeholder="doctor@healthcenter.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="signup-btn">Register Now</button>
        </form>
        <div class="footer-text">
            Already have an account? <a href="{{ url_for('login_page') }}">Login here</a>
        </div>
    </div>
</body>
</html>
